- type: entity
  id: OrganUnguStomach
  parent: OrganHumanStomach
  name: ungu stomach
  description: A lot going on here.
  components:
  - type: Item
    size: Normal
  - type: Sprite
    state: stomach
  - type: SolutionContainerManager
    solutions:
      stomach:
        maxVol: 200
      food:
        maxVol: 15
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 12
  - type: Stomach
    isSpecialDigestibleExclusive: true
    specialDigestible:
      tags:
      - Fruit
      - Pill
      - Crayon
      - Paper
      - BananaPeel
    #  - Ruminant     # Ratbite, linter fails because the tag doesnt exist, too lazy to make it
      - Wheat
      - Vegetable
    #  - UnguFood     # Ratbite, linter fails because the tag doesnt exist, too lazy to make it
      - Flower
      - Mushroom
  - type: Metabolizer
    # maxReagents: 3    # linter fail; cant find where slimepeople define their 5 max reagents (might not even be in yml?) so not fixing this myself
    metabolizerTypes: [ Human ]
    groups:
    - id: Food
    - id: Drink
  - type: Tag
    tags:
    - Meat
    - Organ
    - Stomach
