
#region Medical Orderly
- type: job
  id: MedOrderly
  name: Medical Orderly
  description: "Protect the medical department, its staff, its patients and above all else, the CMO"
  playTimeTracker: JobMedOrderly
  requirements:
    - !type:DepartmentTimeRequirement
      department: Medical
      time: 3600 # 1 hour
    - !type:DepartmentTimeRequirement
      department: Security
      time: 3600 # 1 hour
    - !type:SpeciesRequirement # Ratbite Bill of Rights "non sentient" species.
      inverted: true
      species:
      - Felinid
      - Scurret
  goobcoins: 30
  weight: 20
  startingGear: MedicalOrderlyGear
  icon: "JobIconMedicalOrderly"
  supervisors: ChiefMedicalOfficer
  canBeAntag: false
  access:
  - Maintenance
  - Medical

  special:
  - !type:AddImplantSpecial
    implants: [ MindShieldImplant ]
  - !type:AddComponentSpecial
    components:
      - type: Condemned
        soulOwnedNotDevil: true # Bootlicker for NT
      - type: CombatTrained # ratbite

- type: startingGear
  id: MedicalOrderlyGear
  equipment:
    eyes: ClothingEyesGlassesSunglasses
    ears: ClothingHeadsetMedicalGuard # Their headsets have some seccomms now so they don't deal with shit alone.
    id: MedWatchPDA
  storage:
    back:
    - Flash

- type: chameleonOutfit
  id: MedOrderlyChameleonOutfit
  job: MedOrderly
  hasMindShield: true
  equipment:
    head: ClothingHeadHelmetBasic
    mask: ClothingMaskGasSecurity
    neck: SurveillanceWirelessCameraBodySecurity
    jumpsuit: ClothingUniformJumpsuitMedGuard
    gloves: ClothingHandsGlovesNitrile

#endregion

