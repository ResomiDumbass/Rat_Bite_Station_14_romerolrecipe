- type: entity
  parent: BaseReinforcementBeacon
  id: BaseERTReinforcement
  abstract: true
  components:
  - type: GhostRole
    job: ERTLeader
    name: ghost-role-information-leader-description
    rules: ghost-role-information-nonantagonist-rules
    raffle:
      settings: short
    requirements:
    - !type:DepartmentTimeRequirement
       department: Security
       time: 36000 # ten hours
    - !type:DepartmentTimeRequirement
      department: Command
      time: 18000 # five hours
  - type: GhostCharacterSpawner
    components:
    - type: Loadout
    - type: AutoImplant
      implants: [ FreedomImplant, RadioImplantCentcomm, NutrimentPumpImplant, StypticStimulatorImplant, BluespaceLifelineImplant ] # bluespace implant because unrobust ERT keep giving antags/selfantags free loot
    - type: MindShield

# ERT leader
      
- type: entity
  parent: BaseERTReinforcement
  id: ERTLeaderReinforcement
  suffix: ERT Leader
  components:
  - type: GhostRole
    name: ghost-role-information-ert-leader-name
    description: ghost-role-information-ert-leader-description
