- type: entity
  parent: BaseAction
  id: ActionTraitLeap
  name: Leap
  description: Propel yourself a short distance in the direction of your gaze.
  components:
  - type: Action
    useDelay: 8
    icon:
      sprite: Interface/Actions/jump.rsi
      state: icon
  - type: InstantAction
    event: !type:GravityJumpEvent {}

- type: entity
  parent: BaseAction
  id: ActionActivateLegalFreedomImplant
  name: Break Free
  description: Activating this implant will free you from any hand restraints.
  components:
  - type: Action
    useDelay: 90 # Goob - useful freedom
    checkCanInteract: false
    itemIconStyle: BigAction
    priority: -20
    icon:
      sprite: Actions/Implants/implants.rsi
      state: freedom
  - type: InstantAction
    event: !type:UseFreedomImplantEvent

- type: entity
  parent: BaseAction
  id: ActionMald
  name: action-name-mald
  description: action-description-mald
  components:
  - type: Action
    checkCanInteract: false
    itemIconStyle: BigAction
    icon:
      sprite: Clothing/Mask/clown.rsi
      state: icon
  - type: ConfirmableAction
    popup: mald-action-popup
  - type: InstantAction
    event: !type:MaldActionEvent
